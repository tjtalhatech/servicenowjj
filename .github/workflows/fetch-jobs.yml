name: Fetch ServiceNow Jobs

on:
  schedule:
    # 08:00 and 20:00 UTC daily — adjust to your timezone as needed
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch jobs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ADZUNA_COUNTRIES: ${{ vars.ADZUNA_COUNTRIES }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          # JSearch has a small free quota — only call it on the 08:00 UTC run.
          # The 20:00 run still gets fresh data from Adzuna + RemoteOK + Arbeitnow.
          SKIP_JSEARCH: ${{ github.event.schedule == '0 20 * * *' && 'true' || 'false' }}
        run: python fetch_jobs.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs.json
          git diff --staged --quiet || git commit -m "Update job leads $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: fetch-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
